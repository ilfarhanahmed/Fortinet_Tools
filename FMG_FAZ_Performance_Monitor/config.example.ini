# FMG/FAZ Performance Monitor Configuration
# -----------------------------------------
# This file is a sample config file.
# Copy this file to config.ini and update the values.
#
# IMPORTANT:
# Do not commit the real config file to GitHub because it contains the API key.

[config]

# FortiManager or FortiAnalyzer JSON-RPC URL.
# You can use IP or FQDN.
# Recommended format:
# https://<FMG_OR_FAZ_IP_OR_FQDN>/jsonrpc
url = https://<FMG_OR_FAZ_IP_OR_FQDN>/jsonrpc

# API key generated from FMG/FAZ.
# Keep this private.
api_key = <API_KEY>

# SSL certificate verification.
#
# false = disable SSL verification
# true  = enable SSL verification using system trusted certificates
#
# You can also provide a CA certificate file path, for example:
# verify_ssl = certs/fmg-faz-ca.pem
verify_ssl = false

# Dashboard refresh interval in seconds.
interval = 5